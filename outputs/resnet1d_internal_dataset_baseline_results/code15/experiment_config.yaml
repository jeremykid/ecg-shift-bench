experiment: resnet1d-internal-dataset-baseline
method: source_only
source_datasets:
- PTBXL
- CODE15
- CHAPMAN
- SPH
target_datasets: []
canonical_labels:
- AF
- RBBB
- LBBB
- 1dAVB
- SB
- ST
model:
  name: resnet1d
  in_channels: 12
  width: 32
data:
  input_length: 5000
  target_sampling_rate: 500
  target_length: 5000
  unit: mV
  filtering: none
  cropping: none
  augmentation: none
training:
  epochs: 5
  batch_size: 64
  workers: 0
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: unweighted_bce_with_logits
  scheduler: none
  seed: 42
  amp: fp16_cuda_only
evaluation:
  selection_metric: validation_macro_auprc
  metrics:
  - macro_auroc
  - micro_auroc
  - macro_auprc
  - micro_auprc
  - per_label_auroc
  - per_label_auprc
  - per_label_support
baseline_results:
  output_root: outputs/resnet1d_internal_dataset_baseline_results
  datasets:
    ptbxl:
      dataset: ptbxl
      dataset_config: configs/datasets/ptbxl.yaml
      split_manifest: outputs/dataset_statistics/ptbxl/split_manifest.csv
    code15:
      dataset: code15
      dataset_config: configs/datasets/code15.yaml
      split_manifest: outputs/dataset_statistics/code15/split_manifest.csv
    chapman:
      dataset: chapman
      dataset_config: configs/datasets/chapman.yaml
      split_manifest: outputs/dataset_statistics/chapman/split_manifest.csv
    sph:
      dataset: sph
      dataset_config: configs/datasets/sph.yaml
      split_manifest: outputs/dataset_statistics/sph/split_manifest.csv
