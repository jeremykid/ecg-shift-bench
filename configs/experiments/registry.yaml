experiments:
  ptbxl-source-only-resnet1d-wang-500hz-e1-seed42:
    status: completed
    config: configs/experiments/ptbxl_source_only_resnet1d_wang_e1.yaml
    dataset_snapshot_id: ptbxl-1.0.3-six-label-v1
    dataset_snapshot_manifest: configs/datasets/snapshots/ptbxl-1.0.3-six-label-v1.yaml
    workflow_dag:
      - validate_snapshot
      - real_batch_forward_backward_preflight
      - train_one_epoch
      - select_by_validation_macro_auprc
      - reload_best_checkpoint
      - evaluate_test
    artifact_root: outputs/ptbxl-source-only-resnet1d-wang-500hz-e1-seed42
    model_artifact: outputs/ptbxl-source-only-resnet1d-wang-500hz-e1-seed42/best_checkpoint.pt
    runtime_status: outputs/ptbxl-source-only-resnet1d-wang-500hz-e1-seed42/run_status.json
  dataset-discriminator-xresnet1d-v1:
    status: planned
    config: configs/experiments/dataset_discriminator.yaml
    workflow_dag:
      - load_aligned_samples_on_demand
      - build_cohort_manifest
      - train_dataset_discriminator
      - evaluate_test_split
    artifact_root: outputs/dataset-discriminator
    model_artifact: outputs/dataset-discriminator/best_checkpoint.pt
    runtime_status: outputs/dataset-discriminator/run_status.json
  resnet1d-internal-dataset-baseline:
    status: planned
    config: configs/experiments/resnet1d_internal_dataset_baseline.yaml
    workflow_dag:
      - load_prepared_internal_splits
      - train_shared_resnet1d_baseline
      - select_by_validation_macro_auprc
      - evaluate_internal_test_split
      - write_result_tables
    artifact_root: outputs/resnet1d_internal_dataset_baseline_results
    model_artifact: outputs/resnet1d_internal_dataset_baseline_results/<dataset>/best_checkpoint.pt
    runtime_status: outputs/resnet1d_internal_dataset_baseline_results/run_status.json
