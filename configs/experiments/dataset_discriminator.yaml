experiment: dataset_discriminator_xresnet1d_v1
method: dataset_discriminator
model:
  name: xresnet1d
  in_channels: 12
  channels: 64
  layers: [2, 2, 2, 2]
  expansion: 4
  dropout: 0.0
training:
  batch_size: 64
  epochs: 5
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 42
  workers: 8
dataset_configs:
  PTBXL: configs/datasets/ptbxl.yaml
  CODE15: configs/datasets/code15.yaml
  CHAPMAN: configs/datasets/chapman.yaml
  SPH: configs/datasets/sph.yaml
