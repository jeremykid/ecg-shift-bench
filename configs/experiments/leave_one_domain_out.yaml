experiment: leave_one_domain_out
method: source_only
source_datasets: [PTBXL, CHAPMAN, SPH]
target_datasets: [CODE15]
all_domains: [ptbxl_germany, chapman_ningbo_china, sph_china, code15_brazil]
held_out_domain: code15_brazil
canonical_labels: [AF, RBBB, LBBB, 1dAVB, SB, ST]
model: {name: resnet1d, input_length: 5000, sampling_rate: 500}
training:
  batch_size: 64
  epochs: 30
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 42
split:
  validation_size: 0.1
  test_size: 0.2
evaluation:
  metrics: [macro_auroc, micro_auroc, macro_auprc, micro_auprc, domain_gap]
protocol:
  target_labels_available_during_training: false
