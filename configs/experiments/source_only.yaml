experiment: source_only_ptbxl_to_chapman
method: source_only
source_datasets: [PTBXL]
target_datasets: [CHAPMAN]
canonical_labels: [AF, RBBB, LBBB, 1dAVB, SB, ST]
model:
  name: resnet1d
  input_length: 5000
  sampling_rate: 500
training:
  batch_size: 64
  epochs: 30
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 42
evaluation:
  metrics: [macro_auroc, micro_auroc, macro_auprc, micro_auprc, domain_gap]
  threshold: 0.5
protocol:
  target_labels_available_during_training: false
